<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login ERP COAMO</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- Configurações Globais --- */
body {
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden; /* Impede rolagem devido aos efeitos */
    color: #1a1c1e; /* Texto principal escuro */
}

/* --- Plano de Fundo Dinâmico --- */
body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 110%; /* Ligeiramente maior para a animação de pan */
    height: 110%;
    background-image: url('banner.jpg'); /* A imagem do moinho */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -2; /* Atrás de tudo */
    animation: backgroundMove 10s linear infinite alternate; /* Animação suave de movimento */
}

/* --- Camada de Sobreposição --- */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Gradiente translúcido para profundidade e legibilidade */
    background: linear-gradient(135deg, rgba(10, 25, 40, 0.7) 0%, rgba(0, 0, 0, 0.8) 100%);
    z-index: -1;
    backdrop-filter: blur(2px); /* Efeito sutil de desfoque de fundo */
}

/* --- Partículas de Trigo (Canvas JS) --- */
#wheat-particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0; /* Entre o fundo e o card */
    pointer-events: none; /* Não interfere no clique */
}

/* --- Card de Login --- */
.box {
    background: rgba(255, 255, 255, 0.85); /* Translúcido para ver o fundo */
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); /* Sombra profunda e suave */
    backdrop-filter: blur(10px); /* Efeito de vidro desfoque moderno */
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
    animation: entranceCard 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; /* Animação de entrada */
    z-index: 10; /* À frente de tudo */
    border: 1px solid rgba(255, 255, 255, 0.1); /* Borda sutil de vidro */
}

/* --- Título ERP COAMO --- */
h2 {
    margin-top: 0;
    font-size: 24px;
    font-weight: 700;
    color: #1e3a5a; /* Azul corporativo escuro */
    margin-bottom: 30px;
    background: linear-gradient(135deg, #1e3a5a 0%, #a67f4c 100%); /* Gradiente inspirado em trigo/moinho */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; /* Efeito de texto gradiente */
}

/* --- Campos de Input --- */
.input-wrapper {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #d1dce7;
    font-size: 15px;
    outline: none;
    background: rgba(255, 255, 255, 0.9);
    color: #1e3a5a;
    transition: 0.2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); /* Sombra interna sutil */
}

input:focus {
    border-color: #a67f4c; /* Destaque dourado/trigo ao focar */
    box-shadow: 0 0 0 3px rgba(166, 127, 76, 0.2);
}

/* --- Botão Entrar --- */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(166, 127, 76, 0.3);
    transition: 0.3s;
    background: linear-gradient(135deg, #a67f4c, #d9af7a); /* Gradiente de trigo dourado */
    color: white;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(166, 127, 76, 0.5);
    background: linear-gradient(135deg, #bf9e6d, #e8c697); /* Gradiente mais claro ao passar o mouse */
}

/* --- Animações --- */
@keyframes backgroundMove {
    0% { background-position: center 0%; background-size: 100% 100%; transform: scale(1); }
    100% { background-position: center 20%; background-size: 105% 105%; transform: scale(1.05); } /* Pan e zoom suave */
}

@keyframes entranceCard {
    0% { opacity: 0; transform: translateY(-20px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); } /* Pop suave para o card */
}
</style>
</head>

<body>

<canvas id="wheat-particles"></canvas> <div class="box">
<h2>LOGIN ERP - COAMO</h2> <div class="input-wrapper">
    <input id="user" placeholder="Usuário">
</div>
<div class="input-wrapper">
    <input id="pass" type="password" placeholder="Senha">
</div>

<button onclick="login()">Entrar</button>
</div>

<script>
/* --- Sistema de Partículas de Trigo --- */
const canvas = document.getElementById('wheat-particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray;

class Particle {
    constructor(x, y, directionX, directionY, size, color) {
        this.x = x;
        this.y = y;
        this.directionX = directionX;
        this.directionY = directionY;
        this.size = size;
        this.color = color;
    }
    // Desenha cada partícula
    draw() {
        ctx.beginPath();
        // ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); // Círculo simples
        ctx.fillStyle = this.color;
        
        // Forma de grão de trigo mais elíptica
        ctx.ellipse(this.x, this.y, this.size * 1.5, this.size, 0, 0, Math.PI * 2);
        
        ctx.fill();
    }
    // Verifica a posição da partícula e atualiza
    update() {
        if (this.x > canvas.width || this.x < 0) {
            this.directionX = -this.directionX;
        }
        if (this.y > canvas.height || this.y < 0) {
            this.directionY = -this.directionY;
        }

        this.x += this.directionX;
        this.y += this.directionY;
        this.draw();
    }
}

// Cria o array de partículas
function init() {
    particlesArray = [];
    let numberOfParticles = (canvas.width * canvas.height) / 8000; // Densidade baseada no tamanho da tela
    for (let i = 0; i < numberOfParticles; i++) {
        let size = (Math.random() * 2) + 0.5; // Tamanho grão
        let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
        let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
        let directionX = (Math.random() * 0.4) - 0.2; // Movimento horizontal suave
        let directionY = (Math.random() * 0.6) - 0.1; // Movimento vertical mais forte (caindo/voando)
        let color = 'rgba(217, 175, 122, ' + (Math.random() * 0.6 + 0.1) + ')'; // Cores de trigo dourado translúcido

        particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
    }
}

// Animação contínua
function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
    }
}

// Redimensionamento do canvas ao mudar tamanho da janela
window.addEventListener('resize',
    function() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        init();
    }
);

init();
animate();


/* --- Lógica de Login (original mantida) --- */
function login(){
    const u = user.value;
    const p = pass.value;

    if(u=="admin" && p=="123"){
        localStorage.setItem("user","admin");
        localStorage.setItem("nivel","admin");
        window.location.href="estoque_pro 4.html";
    }
    else if(u=="prep" && p=="123"){
        localStorage.setItem("user","prep");
        localStorage.setItem("nivel","preparacao");
        window.location.href="preparacao.html";
    }
    else if(u=="digit" && p=="123"){
        localStorage.setItem("user","digit");
        localStorage.setItem("nivel","digitalizacao");
        window.location.href="digitalizacao.html";
    }
    else{
        alert("Login inválido");
    }
}
</script>

</body>
</html>
